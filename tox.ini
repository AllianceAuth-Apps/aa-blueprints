[flake8]
exclude = .git, *migrations*, .tox, dist, htmlcov
max-line-length = 88
select = C,E,F,W,B,B950
ignore = E203, E231, E501, W503, W291, W293

[tox]
envlist = {py310, py311, py312, py313}-django{42}, pylint

[testenv]
setenv =
    DJANGO_SETTINGS_MODULE = testauth.settings_aa4.local

extras =
    test

commands_pre=
    pip list

commands=
    coverage run runtests.py blueprints -v 2
    coverage xml
    coverage report

[testenv:pylint]
setenv =
    DJANGO_SETTINGS_MODULE = testauth.settings_aa4.local

deps=
    pylint
    pylint-django

commands=
    pylint --load-plugins pylint_django blueprints
